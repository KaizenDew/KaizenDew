<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#5da9e9" stroke-opacity="0.14" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#5da9e9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#5da9e9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="200" rx="10" fill="#0a0f1a"/>
  <rect width="900" height="200" rx="10" fill="url(#grid)"/>
  <rect width="900" height="200" rx="10" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="899" height="199" rx="10" fill="none" stroke="#5da9e9" stroke-opacity="0.3"/>

  <!-- fake terminal dots -->
  <circle cx="28" cy="28" r="5" fill="#f27878"/>
  <circle cx="46" cy="28" r="5" fill="#f6c177"/>
  <circle cx="64" cy="28" r="5" fill="#6ee7b7"/>
  <text x="86" y="32" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" fill="#7c8ba3">kaizen@blueprint: ~</text>

  <!-- title -->
  <text x="40" y="105" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="46" font-weight="700" fill="#e6edf5">kaizen<tspan fill="#5da9e9">@</tspan>blueprint</text>
  <text x="40" y="135" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="15" fill="#7c8ba3">Unreal Engine 5.7 &#183; Blender &#183; continuous small builds</text>

  <!-- 3D orientation gizmo, slowly spinning -->
  <g transform="translate(800,100)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
      <line x1="0" y1="0" x2="32" y2="0" stroke="#f27878" stroke-width="2"/>
      <text x="38" y="4" font-family="ui-monospace, monospace" font-size="11" fill="#f27878">X</text>
      <line x1="0" y1="0" x2="-16" y2="-27" stroke="#6ee7b7" stroke-width="2"/>
      <text x="-24" y="-30" font-family="ui-monospace, monospace" font-size="11" fill="#6ee7b7">Y</text>
      <line x1="0" y1="0" x2="-16" y2="27" stroke="#5da9e9" stroke-width="2"/>
      <text x="-24" y="38" font-family="ui-monospace, monospace" font-size="11" fill="#5da9e9">Z</text>
      <circle cx="0" cy="0" r="4" fill="#e6edf5"/>
    </g>
  </g>
</svg>
